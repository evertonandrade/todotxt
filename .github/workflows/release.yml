name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build binaries
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -e
          mkdir -p dist

          build() {
            local os=$1 arch=$2 ext=$3
            local target="dist/todotxt-${TAG_NAME}-${os}_${arch}"
            mkdir -p "$target"
            echo "Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "${target}/todotxt${ext}" \
              .
          }

          build linux   amd64 ""
          build linux   arm64 ""
          build darwin  amd64 ""
          build darwin  arm64 ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"

      - name: Package archives
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -e
          cd dist
          cp ../README.md .
          cp ../LICENSE .

          for target in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            dir="todotxt-${TAG_NAME}-${target}"
            cp README.md LICENSE "$dir/"
            tar -czf "${dir}.tar.gz" "$dir"
          done

          for target in windows_amd64 windows_arm64; do
            dir="todotxt-${TAG_NAME}-${target}"
            cp README.md LICENSE "$dir/"
            (cd "$dir" && zip -r "../${dir}.zip" .)
          done

          ls -la

      - name: Generate checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd dist
          sha256sum "todotxt-${TAG_NAME}-"*.tar.gz "todotxt-${TAG_NAME}-"*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/todotxt-${{ github.ref_name }}-linux_amd64.tar.gz
            dist/todotxt-${{ github.ref_name }}-linux_arm64.tar.gz
            dist/todotxt-${{ github.ref_name }}-darwin_amd64.tar.gz
            dist/todotxt-${{ github.ref_name }}-darwin_arm64.tar.gz
            dist/todotxt-${{ github.ref_name }}-windows_amd64.zip
            dist/todotxt-${{ github.ref_name }}-windows_arm64.zip
            dist/SHA256SUMS.txt
